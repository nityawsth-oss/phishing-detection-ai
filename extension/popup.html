<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Phishing Detector</title>
  <style>
    body {
      width: 350px;
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .container {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    
    h1 {
      color: #667eea;
      font-size: 22px;
      margin: 0 0 10px 0;
      text-align: center;
    }
    
    .subtitle {
      text-align: center;
      color: #666;
      font-size: 12px;
      margin-bottom: 20px;
    }
    
    #checkBtn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    #checkBtn:hover {
      transform: scale(1.05);
    }
    
    #checkBtn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    
    #result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      display: none;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .safe {
      background: #d4edda;
      border: 2px solid #28a745;
      color: #155724;
    }
    
    .danger {
      background: #f8d7da;
      border: 2px solid #dc3545;
      color: #721c24;
    }
    
    .result-title {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
    }
    
    .result-icon {
      font-size: 24px;
      margin-right: 10px;
    }
    
    .result-details {
      font-size: 14px;
      margin-top: 10px;
    }
    
    .confidence-bar {
      width: 100%;
      height: 20px;
      background: #f0f0f0;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }
    
    .confidence-fill {
      height: 100%;
      background: linear-gradient(90deg, #28a745 0%, #20c997 100%);
      transition: width 0.5s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 12px;
    }
    
    .loading {
      text-align: center;
      color: #667eea;
      margin-top: 10px;
      display: none;
    }
    
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 10px auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .url-display {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 5px;
      font-size: 11px;
      word-break: break-all;
      margin-top: 10px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛡️ AI Phishing Detector</h1>
    <p class="subtitle">Machine Learning-Powered Protection</p>
    
    <button id="checkBtn">Check This Website</button>
    
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Analyzing website...</p>
    </div>
    
    <div id="result"></div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
